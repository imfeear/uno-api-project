info:
  name: Update Card
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/cards/{{card_id}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "color": "blue",
        "value": "skip",
        "gameId": "{{game_id}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
