info:
  name: Update Score
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/scores/{{score_id}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "playerId": "{{player_id}}",
        "gameId": "{{game_id}}",
        "score": 150
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
