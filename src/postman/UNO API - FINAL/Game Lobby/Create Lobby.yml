info:
  name: Create Lobby
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/game-lobby/create"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{access_token}}
  body:
    type: json
    data: |-
      {
        "name": "Lobby Bruno",
        "rules": "Sem empilhar +4",
        "max_players": 4
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "test(\"Create lobby OK\", function () {\r

        \  expect(res.getStatus()).to.equal(201);\r

        });\r

        const json = res.getBody();\r

        if (json.game_id) {\r

        \  bru.setVar(\"game_id\", json.game_id);\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
