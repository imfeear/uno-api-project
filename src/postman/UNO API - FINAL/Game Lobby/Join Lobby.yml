info:
  name: Join Lobby
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/game-lobby/join"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjUsImlhdCI6MTc3MjkzMTA2NiwiZXhwIjoxNzcyOTM0NjY2fQ.9ENaTaqIlkGQFl1pRZ9TpCO6AGD9ZT2eGey543IHuk4
  body:
    type: json
    data: |-
      {
        "game_id": "{{game_id}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test("Join retornou 200/409/404", function () { expect([200,409,404]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Para testar entrada de outro jogador, registre/logue com outro usuário e reaproveite o mesmo game_id.
