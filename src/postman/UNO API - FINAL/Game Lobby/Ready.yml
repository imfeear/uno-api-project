info:
  name: Ready
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/game-lobby/ready"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{access_token}}
  body:
    type: json
    data: |-
      {
        "game_id": "{{game_id}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test("Ready retornou 200/404/401", function () { expect([200,404,401]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
