info:
  name: Start
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/game-lobby/start"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{access_token}}
  body:
    type: json
    data: |-
      {
        "game_id": "{{game_id}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test("Start retornou 200/409/403/404", function () { expect([200,409,403,404]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
