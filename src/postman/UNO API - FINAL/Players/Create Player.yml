info:
  name: Create Player
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/players"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Player Bruno",
        "age": 20,
        "email": "player_bruno@email.com"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "test(\"Create player OK\", function () {\r

        \  expect(res.getStatus()).to.equal(201);\r

        });\r

        const json = res.getBody();\r

        if (json.id) {\r

        \  bru.setVar(\"player_id\", json.id);\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
