info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "ana",
        "email": "ana@email.com",
        "password": "123456"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test("Register retornou 201 ou 409", function () { expect([201,409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
