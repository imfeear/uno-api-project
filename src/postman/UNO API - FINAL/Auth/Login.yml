info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "ana",
        "password": "123456"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "test(\"Login OK\", function () {\r

        \  expect(res.getStatus()).to.equal(200);\r

        });\r

        const json = res.getBody();\r

        if (json.access_token) {\r

        \  bru.setVar(\"access_token\", json.access_token);\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
