info:
  name: Play Card
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/playCard"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "cardPlayed": "reverse",
        "currentPlayerIndex": 1,
        "players": [
          "Bruno",
          "Ana",
          "Carlos"
        ],
        "direction": "clockwise"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
