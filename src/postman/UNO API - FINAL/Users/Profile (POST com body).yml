info:
  name: Profile (POST com body)
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/users/profile"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "access_token": "{{access_token}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test("Profile POST OK", function () { expect(res.getStatus()).to.equal(200); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
