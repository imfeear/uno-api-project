info:
  name: Update Game
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/games/{{game_id}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Partida CRUD Atualizada",
        "status": "in_progress",
        "maxPlayers": 4
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
